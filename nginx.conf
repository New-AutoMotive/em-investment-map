server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/javascript application/json
               application/geo+json image/svg+xml;
    gzip_min_length 1000;

    # Cache static assets (JS/CSS are content-hashed by Vite)
    location ~* \.(js|css|woff2?|png|jpg|svg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # GeoJSON — set correct MIME type here (avoids overriding global mime.types)
    location ~* \.geojson$ {
        default_type application/geo+json;
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    # SPA fallback — all unmatched paths serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
